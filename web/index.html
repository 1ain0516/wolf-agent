<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wolf Agent v2 — 对局回放</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #151716;
      --panel: #20231f;
      --panel-2: #292d27;
      --line: #3c4238;
      --text: #f2f0e8;
      --muted: #aaa89d;
      --green: #7bc77e;
      --red: #d96f65;
      --gold: #d7b969;
      --blue: #82a9d9;
      --purple: #b392d6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input, select {
      font: inherit;
      color: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: #191c18;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 280px;
    }

    select {
      border: 1px solid var(--line);
      background: var(--panel-2);
      padding: 9px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1px;
      background: var(--line);
    }

    section {
      background: var(--bg);
      min-width: 0;
    }

    .sidebar {
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
      overflow-y: auto;
      max-height: calc(100vh - 80px);
    }

    .game-list {
      display: grid;
      gap: 8px;
    }

    .game-item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .game-item:hover {
      background: var(--panel-2);
    }

    .game-item.active {
      border-color: var(--gold);
      background: var(--panel-2);
    }

    .game-item b {
      display: block;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .game-item small {
      color: var(--muted);
      display: block;
    }

    .content {
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
      overflow-y: auto;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat strong {
      font-size: 18px;
      line-height: 1.2;
    }

    .tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .tab {
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 14px;
    }

    .tab.active {
      border-bottom-color: var(--gold);
      color: var(--text);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .players {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .player {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .player.dead {
      opacity: 0.5;
      filter: grayscale(1);
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-header b {
      font-size: 14px;
    }

    .player-header small {
      color: var(--muted);
      font-size: 12px;
    }

    .personality-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      font-size: 11px;
    }

    .personality-item {
      background: var(--panel-2);
      border-radius: 4px;
      padding: 4px;
      text-align: center;
    }

    .personality-item small {
      display: block;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .personality-item strong {
      display: block;
      color: var(--text);
    }

    .feed {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      max-height: 400px;
      overflow-y: auto;
      padding: 12px;
    }

    .event {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 13px;
    }

    .event:last-child {
      border-bottom: none;
    }

    .event b {
      color: var(--gold);
    }

    .event small {
      display: block;
      color: var(--muted);
      margin-top: 4px;
    }

    .memory {
      background: var(--panel-2);
      border-left: 3px solid var(--blue);
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .memory small {
      color: var(--muted);
      display: block;
      margin-top: 4px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stats-item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .stats-item h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: var(--gold);
    }

    .stats-item p {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .notice {
      color: var(--muted);
      padding: 12px;
      text-align: center;
    }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .sidebar { max-height: 200px; }
      .players { grid-template-columns: repeat(2, 1fr); }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🐺 Wolf Agent v2</h1>
      <div class="toolbar">
        <select id="gameSelect">
          <option value="">选择对局...</option>
        </select>
      </div>
    </header>
    <main>
      <section class="sidebar">
        <div>
          <h3 style="margin: 0 0 8px; font-size: 14px; color: var(--muted);">最近对局</h3>
        </div>
        <div class="game-list" id="gameList"></div>
      </section>
      <section class="content" id="content">
        <div class="notice">选择一个对局开始查看</div>
      </section>
    </main>
  </div>

  <script>
    const roleNames = { werewolf: "狼人", villager: "村民", seer: "预言家", witch: "女巫" };
    const roleColors = { werewolf: var(--red), villager: var(--green), seer: var(--blue), witch: var(--purple) };

    let games = [];
    let currentGame = null;
    let personalities = {};

    async function init() {
      // 加载人格定义
      const persRes = await fetch('/api/personalities');
      personalities = await persRes.json();

      // 加载对局列表
      const gamesRes = await fetch('/api/games');
      games = await gamesRes.json();

      renderGameList();
    }

    function renderGameList() {
      const list = document.getElementById('gameList');
      list.innerHTML = '';

      for (const game of games) {
        const div = document.createElement('div');
        div.className = 'game-item';
        div.innerHTML = `
          <b>${game.game_id.substring(0, 12)}...</b>
          <small>赢家: ${game.winner || '-'}</small>
          <small>轮数: ${game.rounds || '-'} | 事件: ${game.events || '-'}</small>
        `;
        div.addEventListener('click', () => loadGame(game.game_id));
        list.appendChild(div);
      }
    }

    async function loadGame(gameId) {
      const res = await fetch(`/api/games/${gameId}`);
      currentGame = await res.json();
      renderGame();
    }

    function renderGame() {
      if (!currentGame) return;

      const content = document.getElementById('content');
      const { game_id, summary, events, memories, roles, personalities: persos, alive } = currentGame;

      content.innerHTML = `
        <div class="status">
          <div class="stat"><span>Game ID</span><strong>${game_id.substring(0, 12)}</strong></div>
          <div class="stat"><span>赢家</span><strong>${summary?.winner || '-'}</strong></div>
          <div class="stat"><span>轮数</span><strong>${summary?.rounds || '-'}</strong></div>
          <div class="stat"><span>事件</span><strong>${events?.length || '-'}</strong></div>
        </div>

        <div class="tabs">
          <div class="tab active" onclick="switchTab(this, 'players')">玩家</div>
          <div class="tab" onclick="switchTab(this, 'events')">事件</div>
          <div class="tab" onclick="switchTab(this, 'memories')">记忆</div>
          <div class="tab" onclick="switchTab(this, 'stats')">统计</div>
        </div>

        <div id="players" class="tab-content active">
          <div class="players" id="playersGrid"></div>
        </div>

        <div id="events" class="tab-content">
          <div class="feed" id="eventsFeed"></div>
        </div>

        <div id="memories" class="tab-content">
          <div id="memoriesList"></div>
        </div>

        <div id="stats" class="tab-content">
          <div class="stats-grid" id="statsGrid"></div>
        </div>
      `;

      renderPlayers(roles, persos, alive);
      renderEvents(events);
      renderMemories(memories);
      renderStats(summary);
    }

    function renderPlayers(roles, persos, alive) {
      const grid = document.getElementById('playersGrid');
      grid.innerHTML = '';

      for (let id = 1; id <= 9; id++) {
        const role = roles[id] || 'villager';
        const pers = persos[id] || 'BOSS';
        const persData = personalities[pers] || {};
        const isAlive = alive.includes(id);

        const div = document.createElement('div');
        div.className = `player ${isAlive ? '' : 'dead'}`;
        div.innerHTML = `
          <div class="player-header">
            <b>${id}号 ${pers}</b>
            <small>${roleNames[role] || role}</small>
          </div>
          <small style="color: var(--muted);">${isAlive ? '存活' : '死亡'}</small>
          <div class="personality-bar">
            <div class="personality-item">
              <small>说话</small>
              <strong>${(persData.talk || 0).toFixed(2)}</strong>
            </div>
            <div class="personality-item">
              <small>攻击</small>
              <strong>${(persData.aggression || 0).toFixed(2)}</strong>
            </div>
            <div class="personality-item">
              <small>信任</small>
              <strong>${(persData.trust || 0).toFixed(2)}</strong>
            </div>
            <div class="personality-item">
              <small>谎言</small>
              <strong>${(persData.lie || 0).toFixed(2)}</strong>
            </div>
            <div class="personality-item">
              <small>独立</small>
              <strong>${(persData.independence || 0).toFixed(2)}</strong>
            </div>
          </div>
        `;
        grid.appendChild(div);
      }
    }

    function renderEvents(events) {
      const feed = document.getElementById('eventsFeed');
      feed.innerHTML = '';

      const filtered = events.filter(e =>
        ['message_posted', 'action_submitted', 'vote_cast', 'player_eliminated'].includes(e.type)
      );

      for (const e of filtered.slice(-20)) {
        const div = document.createElement('div');
        div.className = 'event';
        div.innerHTML = `
          <b>${eventLabel(e)}</b>
          <p>${eventBody(e)}</p>
          <small>${e.type} · ${e.channel}</small>
        `;
        feed.appendChild(div);
      }

      if (!feed.children.length) {
        feed.innerHTML = '<div class="notice">没有事件</div>';
      }
    }

    function renderMemories(memories) {
      const list = document.getElementById('memoriesList');
      list.innerHTML = '';

      if (!memories || memories.length === 0) {
        list.innerHTML = '<div class="notice">没有记忆数据</div>';
        return;
      }

      for (const mem of memories.slice(0, 10)) {
        const div = document.createElement('div');
        div.className = 'memory';
        div.innerHTML = `
          <b>${mem.player_id}号 ${mem.personality || '-'}</b>
          <p>${mem.reflection || mem.content || '-'}</p>
          <small>strength: ${(mem.strength || 0).toFixed(2)}</small>
        `;
        list.appendChild(div);
      }
    }

    function renderStats(summary) {
      const grid = document.getElementById('statsGrid');
      grid.innerHTML = '';

      if (!summary) {
        grid.innerHTML = '<div class="notice">没有统计数据</div>';
        return;
      }

      const items = [
        { title: '对局时长', value: `${summary.duration || '-'}s` },
        { title: '总事件数', value: summary.event_count || '-' },
        { title: '平均轮数', value: summary.rounds || '-' },
        { title: '赢家阵营', value: summary.winner_team || '-' },
      ];

      for (const item of items) {
        const div = document.createElement('div');
        div.className = 'stats-item';
        div.innerHTML = `<h3>${item.title}</h3><p>${item.value}</p>`;
        grid.appendChild(div);
      }
    }

    function eventLabel(e) {
      if (e.type === 'message_posted') return `${e.from_player}号发言`;
      if (e.type === 'action_submitted') return `${e.from_player}号行动`;
      if (e.type === 'vote_cast') return `${e.from_player}号投票给${e.to_player}号`;
      if (e.type === 'player_eliminated') return `${e.from_player}号出局`;
      return e.type;
    }

    function eventBody(e) {
      if (e.content) return e.content;
      if (e.metadata) return JSON.stringify(e.metadata).substring(0, 100);
      return '-';
    }

    function switchTab(el, tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    init().catch(err => {
      console.error(err);
      document.getElementById('content').innerHTML = `<div class="notice">加载失败: ${err.message}</div>`;
    });
  </script>
</body>
</html>
